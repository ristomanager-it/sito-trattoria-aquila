.print-head{display:none}
@media print{
  @page{margin:14mm}
  .nav,.cta-bar,.lang-bar,.print-btn,footer,.no-print{display:none!important}
  .menu-wrap{padding:0;max-width:none}
  body{background:#fff}
  .print-head{display:block;text-align:center;margin-bottom:6mm}

  .print-head .ph-sub{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#794d01;margin-top:3px}
  .eyebrow,.h2{text-align:center}
  .h2{font-size:26px;margin-bottom:2mm}
  .mcat-h{font-size:19px;margin:8mm 0 2mm;page-break-after:avoid;break-after:avoid}
  .mi{padding:2.4mm 0;page-break-inside:avoid;break-inside:avoid}

  .mi-d{font-size:10.5px}
  .mi-p{font-size:12.5px}
  .menu-nota{text-align:center;font-size:10px;margin-top:8mm}
}

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function renderMenu(lang){
  var body=document.getElementById('menuBody'),h='';
  MENU.cats.forEach(function(c){
    h+='<div class="mcat-h">'+esc(c.name[lang]||c.name.it)+'</div>';
    c.items.forEach(function(it){
      var n=it.n[lang]||it.n.it, d=(it.d&&(it.d[lang]||it.d.it))||'';
      h+='<div class="mi"><div><div class="mi-n">'+esc(n)+'</div>';
      if(d)h+='<div class="mi-d">'+esc(d)+'</div>';
      h+='</div><div class="mi-p">'+esc(it.p)+'</div></div>';
    });
  });
  body.innerHTML=h;
  document.getElementById('mEyebrow').textContent=MENU.ui.eyebrow[lang];
  var t=MENU.ui.titolo[lang]; var parts=t.split(' ');
  document.getElementById('mTitolo').innerHTML=esc(parts.slice(0,-1).join(' '))+' <em>'+esc(parts.slice(-1)[0])+'</em>';
  document.getElementById('mNota').textContent=MENU.ui.nota[lang];
  document.getElementById('printBtn').textContent=MENU.ui.stampa[lang];
  document.getElementById('ctaPren').textContent=MENU.ui.prenota[lang];
  document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.dataset.lang===lang)});
  document.documentElement.lang=lang;
  try{localStorage.setItem('rf_menu_lang',lang)}catch(e){}
}
document.getElementById('langBar').addEventListener('click',function(e){
  var b=e.target.closest('.lang-btn'); if(!b)return;
  renderMenu(b.dataset.lang);
  if(window._rfTrack)window._rfTrack('click','menu_lingua',{valore:b.dataset.lang});
});
var startLang=new URLSearchParams(location.search).get('lang');
try{startLang=startLang||localStorage.getItem('rf_menu_lang')}catch(e){}
if(!MENU.ui.titolo[startLang])startLang='it';
renderMenu(startLang);
</script>
